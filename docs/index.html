<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brain Battle Controller</title>

  <style>
    @font-face {
      font-family: "BrainBattleFont";
      src: url("./assets/fonts/INKFREE.TTF") format("truetype");
      font-weight: normal;
      font-style: normal;
    }

    body {
      margin: 0;
      font-family: "BrainBattleFont", "Ink Free", "Comic Sans MS", cursive;
      background: #f7f1dc;
      color: #111;
      text-align: center;
    }

    .screen {
      min-height: 100vh;
      padding: 24px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #fffdf2;
      background-image:
        linear-gradient(#b7d8ff 1px, transparent 1px),
        linear-gradient(90deg, #b7d8ff 1px, transparent 1px);
      background-size: 28px 28px;
    }

    .screen[hidden] {
      display: none !important;
    }

    h1 {
      font-size: 48px;
      margin: 16px 0;
      text-shadow: 2px 2px 0 white;
    }

    h2 {
      font-size: 34px;
    }

    input {
      width: 90%;
      max-width: 360px;
      font-family: inherit;
      font-size: 26px;
      padding: 18px;
      margin: 10px 0;
      border: none;
      outline: none;
      background: transparent;
      background-image: url("./assets/Button_sprite_empty.png");
      background-size: 100% 100%;
      background-repeat: no-repeat;
      text-align: center;
    }

    button {
      width: 90%;
      max-width: 360px;
      font-family: inherit;
      font-size: 26px;
      padding: 20px;
      margin: 12px 0;
      border: none;
      background: transparent;
      background-image: url("./assets/Button_sprite_empty.png");
      background-size: 100% 100%;
      background-repeat: no-repeat;
      font-weight: bold;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    button:active {
      transform: scale(0.96);
    }

    #joinScreen input {
      width: 75%;
      max-width: 260px;
      font-size: 18px;
      padding: 10px;
      margin: 4px 0;
    }

    #joinScreen button {
      width: 75%;
      max-width: 260px;
      font-size: 20px;
      padding: 12px;
      margin: 8px 0;
    }

    #joinScreen p.small {
      font-size: 14px;
      margin-bottom: 10px;
    }

    #questionText {
      font-size: 52px;
      margin: 28px 0;
    }

    #customKeypad {
      display: grid;
      grid-template-columns: repeat(3, 90px);
      gap: 14px;
      justify-content: center;
      margin: 18px 0;
    }

    .keypadBtn {
      width: 90px;
      height: 70px;
      max-width: none;
      margin: 0;
      padding: 0;
      background-image: url("./assets/Keypad_sprite_empty.png");
      font-size: 32px;
    }

    .keypadBtn:active {
      background-image: url("./assets/Keypad_sprite_filled.png");
      transform: scale(0.94);
    }

    .submitKey {
      background-image: url("./assets/Button_sprite_empty.png");
      font-size: 28px;
    }

    .submitKey:active {
      background-image: url("./assets/Button_sprite_filled.png");
    }

    .actionRow {
      grid-column: span 3;
      display: flex;
      gap: 10px;
      width: 100%;
    }

    .actionBtn {
      flex: 1;
      height: 70px;
      max-width: none;
      margin: 0;
      padding: 0;
      border: none;
      position: relative;
      overflow: hidden;

      background: transparent;
      background-image: url("./assets/Button_sprite_empty.png");
      background-size: 100% 100%;
      background-repeat: no-repeat;

      font-size: 24px;
      font-weight: bold;
    }

    #attackFill,
    #shieldFill {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      background-size: 100% 100%;
      background-repeat: no-repeat;
      background-position: center;
      z-index: 1;
      pointer-events: none;
      clip-path: inset(0 100% 0 0);
    }

    .shieldBtn.ready {
      transform: scale(1.03);
    }

    #attackFill {
      background-image: url("./assets/attack_filled.png");
      transition: clip-path 0.15s ease-out;
    }

    #shieldFill {
      background-image: url("./assets/shield_filled.png");
      transition: clip-path 0.1s linear;
    }

    .actionText {
      position: relative;
      z-index: 2;
      line-height: 70px;
      pointer-events: none;
    }

    .actionBtn:active {
      transform: scale(0.96);
    }

    #submitAnswerBtn {
      display: none;
    }

    #damageBox {
      display: none;
    }
  </style>
</head>

<body>
  <div id="joinScreen" class="screen">
    <h1>Brain Battle</h1>
    <p class="small">Join the battle using the room code on the host screen.</p>

    <input id="nameInput" placeholder="Your name" autocomplete="off" />
    <input id="roomInput" placeholder="Room code" autocomplete="off" />

    <button id="joinBtn">Join Battle</button>
    <p id="joinStatus"></p>
  </div>

  <div id="lobbyScreen" class="screen" hidden>
    <h1>Brain Battle</h1>
    <h2>Waiting Room</h2>
    <p id="lobbyStatus">Connected. Waiting for the host to start.</p>
  </div>

  <div id="gameScreen" class="screen" hidden>
    <h2 id="questionNumberText">Question</h2>
    <div id="questionText">Waiting...</div>

    <input id="answerInput" placeholder="Answer" autocomplete="off" inputmode="none" />

    <div id="customKeypad">
      <button class="keypadBtn" data-key="1">1</button>
      <button class="keypadBtn" data-key="2">2</button>
      <button class="keypadBtn" data-key="3">3</button>

      <button class="keypadBtn" data-key="4">4</button>
      <button class="keypadBtn" data-key="5">5</button>
      <button class="keypadBtn" data-key="6">6</button>

      <button class="keypadBtn" data-key="7">7</button>
      <button class="keypadBtn" data-key="8">8</button>
      <button class="keypadBtn" data-key="9">9</button>

      <button class="keypadBtn" data-key="back">⌫</button>
      <button class="keypadBtn" data-key="0">0</button>
      <button class="keypadBtn submitKey" data-key="submit">OK</button>

      <div class="actionRow">
        <button id="attackBtn" class="actionBtn">
          <span id="attackFill"></span>
          <span class="actionText">ATTACK</span>
        </button>

        <button id="shieldBtn" class="actionBtn">
          <span id="shieldFill"></span>
          <span class="actionText">SHIELD</span>
        </button>
      </div>
    </div>

    <button id="submitAnswerBtn">Submit Answer</button>
    <div id="damageBox">Stored Damage: 0</div>

    <p id="statusText"></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@colyseus/sdk@0.17.41/dist/colyseus.js"></script>
  <script src="./main.js?v=9000"></script>
</body>
</html>
