<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brain Battle Controller</title>

  <style>
    @font-face {
      font-family: "BrainBattleFont";
      src: url("./assets/fonts/INKFREE.TTF") format("truetype");
      font-weight: normal;
      font-style: normal;
    }

    body {
      margin: 0;
      font-family: "BrainBattleFont", "Ink Free", "Comic Sans MS", cursive;
      background: #f7f1dc;
      color: #111;
      text-align: center;
    }

    .screen {
      min-height: 100vh;
      padding: 24px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;

      background-color: #fffdf2;
      background-image:
        linear-gradient(#b7d8ff 1px, transparent 1px),
        linear-gradient(90deg, #b7d8ff 1px, transparent 1px);
      background-size: 28px 28px;
    }

    .screen[hidden] {
      display: none !important;
    }

    h1 {
      font-size: 48px;
      margin: 16px 0;
      text-shadow: 2px 2px 0 white;
    }

    h2 {
      font-size: 34px;
    }

    /* ---------- DEFAULT INPUTS (GAME SCREEN) ---------- */
    input {
      width: 90%;
      max-width: 360px;
      font-family: inherit;
      font-size: 26px;
      padding: 18px;
      margin: 10px 0;
      border: none;
      outline: none;
      background: transparent;
      background-image: url("./assets/Button_sprite_empty.png");
      background-size: 100% 100%;
      background-repeat: no-repeat;
      text-align: center;
    }

    /* ---------- DEFAULT BUTTONS (GAME SCREEN) ---------- */
    button {
      width: 90%;
      max-width: 360px;
      font-family: inherit;
      font-size: 26px;
      padding: 20px;
      margin: 12px 0;
      border: none;
      background: transparent;
      background-image: url("./assets/Button_sprite_empty.png");
      background-size: 100% 100%;
      background-repeat: no-repeat;
      font-weight: bold;
    }

    button:active {
      background-image: url("./assets/Button_sprite_filled.png");
      transform: scale(0.96);
    }

    /* ---------- JOIN SCREEN (SMALLER ELEMENTS) ---------- */
    #joinScreen input {
      width: 75%;
      max-width: 260px;
      font-size: 18px;
      padding: 10px;
      margin: 4px 0;
    }

    #joinScreen button {
      width: 75%;
      max-width: 260px;
      font-size: 20px;
      padding: 12px;
      margin: 8px 0;
    }

    #joinScreen p.small {
      font-size: 14px;
      margin-bottom: 10px;
    }

    #questionText {
      font-size: 52px;
      margin: 28px 0;
    }

    /* ---------- KEYPAD ---------- */
    #customKeypad {
      display: grid;
      grid-template-columns: repeat(3, 90px);
      gap: 14px;
      justify-content: center;
      margin: 18px 0;
    }

    .keypadBtn {
      width: 90px;
      height: 70px;
      max-width: none;
      margin: 0;
      padding: 0;
      border: none;
      background: transparent;
      background-image: url("./assets/Keypad_sprite_empty.png");
      background-size: 100% 100%;
      background-repeat: no-repeat;
      font-size: 32px;
      font-family: inherit;
      font-weight: bold;
    }

    .keypadBtn:active {
      background-image: url("./assets/Keypad_sprite_filled.png");
      transform: scale(0.94);
    }

    .submitKey {
      background-image: url("./assets/Keypad_sprite_empty.png");
      font-size: 28px;
    }

    .submitKey:active {
      background-image: url("./assets/Keypad_sprite_filled.png");
    }

    /* ---------- ATTACK BUTTON ---------- */
    .attackKey {
      grid-column: span 3;
      width: 100%;
      height: 80px;
      max-width: none;
      margin: 0;
      padding: 0;
      border: none;

      position: relative;
      overflow: hidden;

      background: transparent;
      background-image: url("./assets/Button_sprite_empty.png");
      background-size: 100% 100%;
      background-repeat: no-repeat;
    }

    #attackFill {
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      width: 0%;

      background-image: url("./assets/Button_sprite_filled.png");
      background-size: auto 100%;
      background-repeat: no-repeat;
      background-position: left center;

      z-index: 1;
      pointer-events: none;
    }

    .attackText {
      position: relative;
      z-index: 2;

      font-size: 34px;
      font-weight: bold;
      font-family: inherit;
      line-height: 80px;
      pointer-events: none;
    }

    .attackKey:active {
      transform: scale(0.97);
    }

    /* hide old submit button */
    #submitAnswerBtn {
      display: none;
    }

    #damageBox {
      display: none;
    }

  </style>
</head>

<body>
  <div id="joinScreen" class="screen">
    <h1>Brain Battle</h1>
    <p class="small">Join the battle using the room code on the host screen.</p>

    <input id="nameInput" placeholder="Your name" autocomplete="off" />
    <input id="roomInput" placeholder="Room code" autocomplete="off" />

    <button id="joinBtn">Join Battle</button>

    <p id="joinStatus"></p>
  </div>

  <div id="lobbyScreen" class="screen" hidden>
    <h1>Brain Battle</h1>
    <h2>Waiting Room</h2>
    <p id="lobbyStatus">Connected. Waiting for the host to start.</p>
  </div>

  <div id="gameScreen" class="screen" hidden>
    <h2 id="questionNumberText">Question</h2>
    <div id="questionText">Waiting...</div>

    <input 
      id="answerInput" 
      placeholder="Answer" 
      autocomplete="off" 
      readonly 
    />

    <div id="customKeypad">
      <button class="keypadBtn" data-key="1">1</button>
      <button class="keypadBtn" data-key="2">2</button>
      <button class="keypadBtn" data-key="3">3</button>

      <button class="keypadBtn" data-key="4">4</button>
      <button class="keypadBtn" data-key="5">5</button>
      <button class="keypadBtn" data-key="6">6</button>

      <button class="keypadBtn" data-key="7">7</button>
      <button class="keypadBtn" data-key="8">8</button>
      <button class="keypadBtn" data-key="9">9</button>

      <button class="keypadBtn" data-key="back">⌫</button>
      <button class="keypadBtn" data-key="0">0</button>
      <button class="keypadBtn submitKey" data-key="submit">OK</button>

      <button id="attackBtn" class="attackKey">
        <span id="attackFill"></span>
        <span class="attackText">ATTACK</span>
      </button>
    </div>

    <button id="submitAnswerBtn">Submit Answer</button>

    <div id="damageBox">Stored Damage: 0</div>

    <p id="statusText"></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@colyseus/sdk@0.17.41/dist/colyseus.js"></script>
  <script src="./main.js?v=8000"></script>
</body>
</html>
