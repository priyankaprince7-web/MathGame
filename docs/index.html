<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Brain Battle Controller</title>

<style>
@font-face {
  font-family: "BrainBattleFont";
  src: url("./assets/fonts/INKFREE.TTF") format("truetype");
}

body {
  margin: 0;
  font-family: "BrainBattleFont", "Ink Free", cursive;
  background: #f7f1dc;
  text-align: center;
  overflow: auto;
}

body.lockScroll {
  overflow: hidden;
}

.screen {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background:
    linear-gradient(#b7d8ff 1px, transparent 1px),
    linear-gradient(90deg, #b7d8ff 1px, transparent 1px);
  background-size: 28px 28px;
}

.screen[hidden] {
  display: none !important;
}

h2 { margin: 6px 0; }

input {
  width: 75%;
  max-width: 260px;
  padding: 12px;
  margin: 6px 0;
  border: none;
  background: url("./assets/Button_sprite_empty.png") no-repeat center/100% 100%;
  text-align: center;
}

button {
  width: 75%;
  max-width: 260px;
  padding: 14px;
  margin: 8px 0;
  border: none;
  background: url("./assets/Button_sprite_empty.png") no-repeat center/100% 100%;
  font-weight: bold;
}

button:active {
  background-image: url("./assets/Button_sprite_filled.png");
  transform: scale(0.96);
}

/* GAME LAYOUT */
#gameControls {
  width: max-content;
  display: flex;
  flex-direction: column;
  align-items: center;
}

#customKeypad {
  display: grid;
  grid-template-columns: repeat(3, 78px);
  gap: 10px;
}

.keypadBtn {
  width: 78px;
  height: 60px;
  background: url("./assets/Keypad_sprite_empty.png") no-repeat center/100% 100%;
  font-size: 26px;
}

.keypadBtn:active {
  background-image: url("./assets/Keypad_sprite_filled.png");
}

/* ACTION BUTTONS */
.actionRow {
  grid-column: span 3;
  display: flex;
  gap: 10px;
}

.actionBtn {
  flex: 1;
  height: 60px;
  position: relative;
  background: url("./assets/Button_sprite_empty.png") no-repeat center/100% 100%;
}

.actionText {
  position: relative;
  z-index: 2;
  line-height: 60px;
}

#attackFill,
#healFill {
  position: absolute;
  inset: 0;
  clip-path: inset(0 100% 0 0);
}

#attackFill {
  background: url("./assets/attack_filled.png") no-repeat center/100% 100%;
}

#healFill {
  background: url("./assets/shield_filled.png") no-repeat center/100% 100%;
}

/* HEALTH */
#healthPanel {
  width: 100%;
  margin-top: 10px;
}

.healthBlock {
  margin: 4px 0;
}

.healthBar {
  width: 100%;
  height: 28px;
  background: url("./assets/Button_sprite_empty.png") no-repeat center/100% 100%;
  overflow: hidden;
}

.healthFill {
  height: 100%;
  width: 100%;
  transition: width 0.2s;
}

.myHealthFill {
  background: url("./assets/shield_filled.png") no-repeat center/100% 100%;
}

.opponentHealthFill {
  background: url("./assets/attack_filled.png") no-repeat center/100% 100%;
}

/* END SCREEN */
#gameScreen.ended #customKeypad,
#gameScreen.ended #healthPanel {
  display: none !important;
}
</style>
</head>

<body>

<!-- JOIN -->
<div id="joinScreen" class="screen">
  <h2>Brain Battle</h2>
  <input id="nameInput" placeholder="Your name" />
  <input id="roomInput" placeholder="Room code" />
  <button id="joinBtn">Join Battle</button>
</div>

<!-- LOBBY -->
<div id="lobbyScreen" class="screen" hidden>
  <h2>Waiting for players...</h2>
</div>

<!-- GAME -->
<div id="gameScreen" class="screen" hidden>

  <h2 id="questionNumberText">Question</h2>
  <div id="questionText">Waiting...</div>

  <div id="gameControls">

    <div id="customKeypad">
      <button class="keypadBtn" data-key="1">1</button>
      <button class="keypadBtn" data-key="2">2</button>
      <button class="keypadBtn" data-key="3">3</button>

      <button class="keypadBtn" data-key="4">4</button>
      <button class="keypadBtn" data-key="5">5</button>
      <button class="keypadBtn" data-key="6">6</button>

      <button class="keypadBtn" data-key="7">7</button>
      <button class="keypadBtn" data-key="8">8</button>
      <button class="keypadBtn" data-key="9">9</button>

      <button class="keypadBtn" data-key="back">⌫</button>
      <button class="keypadBtn" data-key="0">0</button>
      <button class="keypadBtn" data-key="submit">OK</button>

      <div class="actionRow">
        <button id="attackBtn" class="actionBtn">
          <span id="attackFill"></span>
          <span class="actionText">ATTACK</span>
        </button>

        <button id="healBtn" class="actionBtn">
          <span id="healFill"></span>
          <span class="actionText">HEAL</span>
        </button>
      </div>
    </div>

    <!-- HEALTH BELOW -->
    <div id="healthPanel">
      <div class="healthBlock">
        <div id="myHealthLabel">Your Health</div>
        <div class="healthBar">
          <div id="myHealthFill" class="healthFill myHealthFill"></div>
        </div>
      </div>

      <div class="healthBlock">
        <div id="opponentHealthLabel">Opponent Health</div>
        <div class="healthBar">
          <div id="opponentHealthFill" class="healthFill opponentHealthFill"></div>
        </div>
      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@colyseus/sdk@0.17.41/dist/colyseus.js"></script>
<script src="./main.js?v=200000"></script>

</body>
</html>
