<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brain Battle Controller</title>

  <style>
    @font-face {
      font-family: "BrainBattleFont";
      src: url("./assets/fonts/SweetGetawayDemoRegular-2XyK.ttf") format("truetype");
      font-weight: normal;
      font-style: normal;
    }

    body {
      margin: 0;
      font-family: "BrainBattleFont", "Ink Free", "Comic Sans MS", cursive;
      background: #f7f1dc;
      color: #111;
      text-align: center;
    }

    .screen {
      min-height: 100vh;
      padding: 24px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;

      /* grid paper */
      background-color: #fffdf2;
      background-image:
        linear-gradient(#b7d8ff 1px, transparent 1px),
        linear-gradient(90deg, #b7d8ff 1px, transparent 1px);
      background-size: 28px 28px;
    }

    h1 {
      font-size: 48px;
      margin: 16px 0;
      text-shadow: 2px 2px 0 white;
    }

    h2 {
      font-size: 34px;
    }

    input {
      width: 90%;
      max-width: 360px;
      font-family: inherit;
      font-size: 26px;
      padding: 18px;
      margin: 10px 0;
      border: none;
      outline: none;
      background: transparent;
      background-image: url("./assets/Button_sprite_empty.png");
      background-size: 100% 100%;
      background-repeat: no-repeat;
      text-align: center;
    }

    button {
      width: 90%;
      max-width: 360px;
      font-family: inherit;
      font-size: 26px;
      padding: 20px;
      margin: 12px 0;
      border: none;
      background: transparent;
      background-image: url("./assets/Button_sprite_empty.png");
      background-size: 100% 100%;
      background-repeat: no-repeat;
      font-weight: bold;
    }

    button:active {
      background-image: url("./assets/Button_sprite_filled.png");
      transform: scale(0.96);
    }

    #customKeypad {
      display: grid;
      grid-template-columns: repeat(3, 90px);
      gap: 14px;
      justify-content: center;
      margin: 18px 0;
    }

    .keypadBtn {
      width: 90px;
      height: 70px;
      max-width: none;
      margin: 0;
      padding: 0;
      border: none;
      background: transparent;
      background-image: url("./assets/Keypad_sprite_empty.png");
      background-size: 100% 100%;
      background-repeat: no-repeat;
      font-size: 32px;
      font-family: inherit;
      font-weight: bold;
    }

    .keypadBtn:active {
      background-image: url("./assets/Keypad_sprite_filled.png");
      transform: scale(0.94);
    }

    #attackBtn {
      background: #ffd6d6;
    }

    #questionText {
      font-size: 52px;
      margin: 28px 0;
    }

    .attackKey {
      grid-column: span 3;   /* THIS makes it stretch across */

      width: 100%;
      height: 80px;

      font-size: 34px;
      font-weight: bold;

      background-image: url("./assets/Button_sprite_empty.png");
      background-size: 100% 100%;
      background-repeat: no-repeat;

      border: none;
    }

    .attackKey:active {
      background-image: url("./assets/Button_sprite_filled.png");
      transform: scale(0.97);
    }

    .submitKey {
      background-image: url("./assets/Button_sprite_empty.png"); /* bigger feel */
      font-size: 28px;
    }

    .submitKey:active {
      background-image: url("./assets/Button_sprite_filled.png");
    }
  </style>
</head>

<body>
  <div id="joinScreen" class="screen">
    <h1>Brain Battle</h1>
    <p class="small">Join the battle using the room code on the host screen.</p>

    <input id="nameInput" placeholder="Your name" autocomplete="off" />
    <input id="roomInput" placeholder="Room code" autocomplete="off" />

    <button id="joinBtn">Join Battle</button>

    <p id="joinStatus"></p>
  </div>

  <div id="lobbyScreen" class="screen" hidden>
    <h1>Brain Battle</h1>
    <h2>Waiting Room</h2>
    <p id="lobbyStatus">Connected. Waiting for the host to start.</p>
  </div>

  <div id="gameScreen" class="screen" hidden>
    <h2 id="questionNumberText">Question</h2>
    <div id="questionText">Waiting...</div>

    <input 
      id="answerInput" 
      placeholder="Answer" 
      autocomplete="off" 
      readonly 
    />

    <div id="customKeypad">
      <button class="keypadBtn" data-key="1">1</button>
      <button class="keypadBtn" data-key="2">2</button>
      <button class="keypadBtn" data-key="3">3</button>

      <button class="keypadBtn" data-key="4">4</button>
      <button class="keypadBtn" data-key="5">5</button>
      <button class="keypadBtn" data-key="6">6</button>

      <button class="keypadBtn" data-key="7">7</button>
      <button class="keypadBtn" data-key="8">8</button>
      <button class="keypadBtn" data-key="9">9</button>

      <!-- swapped row -->
      <button class="keypadBtn" data-key="back">⌫</button>
      <button class="keypadBtn" data-key="0">0</button>
      <button class="keypadBtn submitKey" data-key="submit">OK</button>

      <!-- attack row -->
      <button id="attackBtn" class="attackKey">ATTACK</button>
    </div>

    <button id="submitAnswerBtn">Submit Answer</button>

    <div id="damageBox">Stored Damage: 0</div>

    <p id="statusText"></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@colyseus/sdk@0.17.41/dist/colyseus.js"></script>
  <script src="./main.js?v=3000"></script>
  
</body>
</html>
